{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;padding:30px;border:1px solid #ccc;border-radius:8px;">
    <h2 style="text-align:center;">Acceso de Usuario</h2>

    {% if error %}
        <p style="color:red;text-align:center;">{{ error }}</p>
    {% endif %}

    <form method="post" style="display:flex;flex-direction:column;gap:10px;">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit" style="background:#7c0a02;color:#fff;padding:10px;border:none;border-radius:4px;">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
